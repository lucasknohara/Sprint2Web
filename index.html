<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page de Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-login">
        <form class="caixa-login" id="formularioRegistro">
            <h1>Criar Conta</h1>

            <div class="grupo-input">
                <label>Nome</label>
                <input type="text" id="usuario" placeholder="Digite seu nome" required>
            </div>

            <div class="grupo-input">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Crie uma senha" required>
            </div>

            <button type="submit">Registrar</button>

            <p id="mensagem"></p>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
