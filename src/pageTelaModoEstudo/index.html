<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de Câmera - Resultado IA</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="aplicativo-camera">
        <main class="container-modal-ia">
            <div class="cartao-resultado-ia">
                <div class="header-modal">
                    <a href="../pageModoEstudoAtt/index.html" style="text-decoration: none;">
                        <img alt="Saida" src="../img/x.png" class="btn-x">
                    </a>
                </div>

                <div class="container-imagem">
                    <img src="../img/Quadro-Matematica.png" alt="Quadro de Matemática" class="imagem-quadro">
                </div>

                <div class="info-resultado">
                    <h2>IA Processou: Quadro de matemática - Geometria 
                        <img src="../img/editar-arquivo.png" class="mini-icone" alt="Editar Texto">
                    </h2>
                </div>

                <div class="secao-acoes">
                    <h3>Ações Rapidas</h3>
                    <div class="grade-botoes-curtos">
                        <button class="btn-escuro">Salvar na pasta da Matéria Matemática</button>
                        <button class="btn-escuro">Editar</button>
                        <button class="btn-escuro">Compartilhas</button>
                    </div>
                </div>

                <div class="secao-acoes">    
                    <h3>Ações da IA</h3>
                    <div class="grade-ia">
                        <button class="btn-ia"><img alt="PDF" src="../img/pdf.png"> Transformar em PDF Organizado</button>
                        <button class="btn-ia"><img alt="Resumir" src="../img/lampada-de-ideia.png"> Resumir Conteúdo com IA</button>
                        <button class="btn-ia"><img alt="Extrair" src="../img/texto.png"> Extrair Texto Completo</button>
                        <button class="btn-ia"><img alt="Legibilidade" src="../img/galeria-de-fotos.png"> Melhorar Legibilidade</button>
                        <button class="btn-ia"><img alt="FlashCard" src="../img/flashcard.png"> Gerar FlashCards</button>
                    </div>
                </div>

                <a href="../pageModoEstudoAtt/index.html" style="text-align: center;">
                    <button class="botao-ok-amarelo">Ok</button>
                </a>
            </div>
        </main>

        <footer class="area-inferior">
            <div class="navegacao-sistema">
                <img src="../img/menu-hamburguer.png" alt="Abas" class="icone-nav">
                <img src="../img/circulo.png" alt="Início" class="icone-nav">
                <img src="../img/angulo-esquerdo.png" alt="Home" class="icone-nav">
            </div>
        </footer>

    </div>

</body>
</html>
