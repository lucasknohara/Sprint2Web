<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de Câmera - Modo Foto</title>
    <link rel="stylesheet" href="../pageModoRetratoAtt/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="aplicativo-camera">
        
        <header class="barra-topo">
            <img src="../img/camera.png" alt="Câmera" class="icone">
            <img src="../img/trovao.png" alt="Flash" class="icone">
            <img src="../img/sla.png" alt="Otimização" class="icone">
            <div class="texto-zeiss">ZEISS</div>
            <img src="../img/margarida-alternativa.png" alt="Macro" class="icone">
            <img src="../img/definicoes.png" alt="Configurações" class="icone">
        </header>

        <main class="visualizacao-camera">
            <img src="../img/Quadro-Matematica.png" alt="Preview" class="foto-preview">
            
            <div class="controles-zoom">
                <span>0.5</span>
                <span>1</span>
                <span class="zoom-ativo">2x</span>
            </div>
            
            <div class="botao-efeito">
                <img src="../img/varinha-magica.png" alt="varinha">
            </div>
        </main>

        <footer class="area-inferior">
            <nav class="seletor-modos">
                <a href="../pageModoEstudoAtt/index.html" style="text-decoration: none;">
                    <span>Estudo</span>
                </a>
                <a href="../pageModoNoiteAtt/index.html" style="text-decoration: none;">
                    <span>Noite</span>
                </a>
                <a href="../pageFotoMateria/index.html" style="text-decoration: none;">
                    <span>Foto</span>
                </a>
                <span>Vídeo</span>
                <span class="ativo">Retrato</span>
                <a href="../pageMais/index.html" style="text-decoration: none;">
                    <span>Mais</span>
                </a>
            </nav>

            <div class="linha-disparo">
                <div class="previa-galeria"></div>
                <div class="botao-disparador">
                    <div class="circulo-interno"></div>
                </div>
                <img src="../img/atualizar.png" alt="Inverter" class="alternar-camera">
            </div>

            <div class="navegacao-sistema">
                <img src="../img/menu-hamburguer.png" alt="Abas" class="icone-nav">
                <img src="../img/circulo.png" alt="Início" class="icone-nav">
                <img src="../img/angulo-esquerdo.png" alt="Home" class="icone-nav">
            </div>
        </footer>

    </div>

</body>
</html>
